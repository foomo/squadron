name: Setup Go
description: Install Go using the version pinned in go.mod

runs:
  using: composite
  steps:
    # https://github.com/actions/setup-go/releases
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        check-latest: true
        go-version-file: go.mod
